<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Download Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-background: #FEF7FF;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            padding: 48px 16px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .intro-text {
            text-align: center;
            margin-bottom: 40px;
            color: var(--md-sys-color-on-surface-variant);
        }

        .intro-text h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--md-sys-color-on-surface);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }

        .mdc-card {
            background-color: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-surface-variant);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: box-shadow 0.2s ease;
        }

        .mdc-card:hover {
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .file-icon {
            font-size: 40px;
            color: var(--md-sys-color-primary);
        }

        .file-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .file-meta {
            font-size: 0.875rem;
            color: var(--md-sys-color-outline);
            margin-top: 4px;
        }

        .card-body {
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .file-description {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--md-sys-color-on-surface-variant);
            margin: 0 0 16px 0;
        }

        .md5-box {
            background-color: var(--md-sys-color-surface-variant);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px dashed var(--md-sys-color-outline);
        }

        .md5-label {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-top: 16px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 100px;
            padding: 0 16px;
            height: 40px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            box-sizing: border-box;
            font-size: 0.9rem;
            width: 100%;
        }

        .btn-primary {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
        }

        .btn-primary:hover {
            background-color: #533d8b;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--md-sys-color-primary);
            border: 1px solid var(--md-sys-color-outline);
        }

        .btn-secondary:hover {
            background-color: rgba(103, 80, 164, 0.08);
            border-color: var(--md-sys-color-primary);
        }

        .btn-text {
            background-color: transparent;
            color: var(--md-sys-color-primary);
            border: none;
        }

        .btn-text:hover {
            background-color: rgba(103, 80, 164, 0.08);
            text-decoration: underline;
        }

        @media (min-width: 480px) {
            .actions-container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .btn-primary, .btn-secondary {
                flex: 1;
                width: auto;
            }
            .btn-text {
                width: 100%;
            }
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.875rem;
            color: var(--md-sys-color-outline);
            border-top: 1px solid var(--md-sys-color-surface-variant);
        }
    </style>
</head>
<body>

    <main>
        <div class="intro-text">
            <h2>Available Downloads</h2>
            <p>Please verify the MD5 checksum after downloading to ensure file integrity.</p>
        </div>

        <div class="grid" id="download-grid"></div>
    </main>

    <footer>
        &copy; 2026 Download Portal. All rights reserved.
    </footer>

    <script>
        const downloadFiles = [
            {
                title: "Youtube Morphe",
                size: "45.2 MB",
                format: "APK",
                icon: "description", // Choose: 'description', 'archive', 'video_file', 'image'
                description: "This is the core software installation package. It includes the localized setup configurations and engine libraries.",
                md5: "7a1b9c3d4e5f6a7b8c9d0e1f2a3b4c5d",
                downloadUrl: "YOUR_GOOGLE_DRIVE_OR_MEDIAFIRE_LINK",
                adlinkUrl: "YOUR_ADLINK_URL",
                githubUrl: "YOUR_GITHUB_REPOSITORY_URL"
            },
            {
                title: "Project_Assets.zip",
                size: "128.5 MB",
                format: "ZIP",
                icon: "archive",
                description: "A comprehensive bundle containing compressed high-definition skins, visual models, and sample extension scripts.",
                md5: "9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c",
                downloadUrl: "YOUR_GOOGLE_DRIVE_OR_MEDIAFIRE_LINK",
                adlinkUrl: "YOUR_ADLINK_URL",
                githubUrl: "YOUR_GITHUB_REPOSITORY_URL"
            }
        ];

        // This function handles rendering the data dynamically. You don't need to touch this.
        function renderCards() {
            const grid = document.getElementById('download-grid');
            grid.innerHTML = downloadFiles.map(file => `
                <div class="mdc-card">
                    <div>
                        <div class="card-header">
                            <span class="material-symbols-outlined file-icon">${file.icon}</span>
                            <div>
                                <h3 class="file-title">${file.title}</h3>
                                <div class="file-meta">Size: ${file.size} | Format: ${file.format}</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <p class="file-description">${file.description}</p>
                            <div class="md5-box">
                                <span class="md5-label">MD5 Checksum</span>
                                ${file.md5}
                            </div>
                        </div>
                    </div>
                    <div class="actions-container">
                        <a href="${file.downloadUrl}" target="_blank" class="download-btn btn-primary">
                            <span class="material-symbols-outlined">download</span> Download
                        </a>
                        <a href="${file.adlinkUrl}" target="_blank" class="download-btn btn-secondary">
                            <span class="material-symbols-outlined">link</span> AdLink
                        </a>
                        <a href="${file.githubUrl}" target="_blank" class="download-btn btn-text">
                            <span class="material-symbols-outlined">code</span> View Source on GitHub
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Run setup
        renderCards();
    </script>
</body>
</html>
